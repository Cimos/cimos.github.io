<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="25%" r="90%">
      <stop offset="0%" stop-color="#1b1330"/>
      <stop offset="100%" stop-color="#0B0912"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35D6EA"/>
      <stop offset="100%" stop-color="#7fe9f4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="108" fill="none" stroke="#2A2440" stroke-width="6"/>

  <!-- chip pins -->
  <g fill="#FF2E88">
    <rect x="150" y="70" width="26" height="34" rx="6"/>
    <rect x="243" y="70" width="26" height="34" rx="6"/>
    <rect x="336" y="70" width="26" height="34" rx="6"/>
    <rect x="150" y="408" width="26" height="34" rx="6"/>
    <rect x="243" y="408" width="26" height="34" rx="6"/>
    <rect x="336" y="408" width="26" height="34" rx="6"/>
  </g>
  <g fill="#35D6EA">
    <rect x="70" y="150" width="34" height="26" rx="6"/>
    <rect x="70" y="243" width="34" height="26" rx="6"/>
    <rect x="70" y="336" width="34" height="26" rx="6"/>
    <rect x="408" y="150" width="34" height="26" rx="6"/>
    <rect x="408" y="243" width="34" height="26" rx="6"/>
    <rect x="408" y="336" width="34" height="26" rx="6"/>
  </g>

  <!-- die -->
  <rect x="104" y="104" width="304" height="304" rx="52" fill="#12101c" stroke="#2A2440" stroke-width="4"/>

  <!-- monogram C -->
  <path d="M 330 190
           A 92 92 0 1 0 330 322"
        fill="none" stroke="url(#stroke)" stroke-width="34" stroke-linecap="round"/>
  <!-- node dot in the gap -->
  <circle cx="332" cy="256" r="20" fill="#FF2E88"/>
