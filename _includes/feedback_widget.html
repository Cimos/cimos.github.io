<!-- ===== etchy feedback overlay (dev builds only): floating button -> POST /feedback ===== -->
<!-- Adapted from etchy's web-demo widget. Rendered only when jekyll.environment == development;
     scripts/dev-server.py serves _site and appends submissions to .feedback/feedback.jsonl. -->
<style>
#etfb-root *{box-sizing:border-box;font-family:"Inter",-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
#etfb-fab{position:fixed;left:18px;bottom:18px;z-index:2147483000;display:flex;align-items:center;gap:8px;cursor:pointer;
  background:var(--pink,#FF2E88);color:#0B0912;font-weight:800;border:0;border-radius:24px;padding:11px 17px;font-size:14px;box-shadow:0 6px 20px rgba(0,0,0,.5)}
#etfb-fab:hover{filter:brightness(1.07)}
#etfb-panel{position:fixed;left:18px;bottom:18px;z-index:2147483001;width:340px;max-width:calc(100vw - 36px);
  background:var(--bg-secondary,#15121F);border:1px solid var(--edge,#2A2440);border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,.6);
  transform:translateY(12px) scale(.98);opacity:0;pointer-events:none;transition:.16s ease;color:var(--text,#C9C4DA)}
#etfb-panel.open{transform:none;opacity:1;pointer-events:auto}
#etfb-panel .etfb-h{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--edge,#2A2440)}
#etfb-panel .etfb-h b{font-size:14px;color:var(--headings,#EDEAF6)}
#etfb-panel .etfb-x{margin-left:auto;cursor:pointer;color:var(--text-secondary,#7E7897);font-size:20px;line-height:1;border:0;background:none}
#etfb-panel .etfb-body{padding:13px 14px;max-height:min(70vh,460px);overflow:auto}
.etfb-sents{display:flex;gap:6px;margin-bottom:14px}
.etfb-sent{flex:1;cursor:pointer;background:var(--panel-2,#1C1830);border:1px solid var(--edge,#2A2440);border-radius:9px;color:var(--text,#C9C4DA);padding:9px 4px;font-size:12.5px;font-weight:600}
.etfb-sent.on{border-color:var(--blue,#35D6EA);background:color-mix(in srgb,var(--blue,#35D6EA) 14%,transparent);color:var(--blue,#35D6EA)}
#etfb-panel .etfb-l{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-secondary,#7E7897);margin:2px 0 7px}
.etfb-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:13px}
.etfb-pill{font-size:12px;padding:5px 10px;border-radius:14px;border:1px solid var(--edge,#2A2440);background:var(--panel-2,#1C1830);color:var(--text,#C9C4DA);cursor:pointer}
.etfb-pill.on{background:color-mix(in srgb,var(--blue,#35D6EA) 16%,transparent);border-color:var(--blue,#35D6EA);color:var(--blue,#35D6EA)}
.etfb-sev{display:flex;gap:6px;margin-bottom:13px}
.etfb-s{flex:1;text-align:center;font-size:11.5px;padding:7px 0;border-radius:7px;border:1px solid var(--edge,#2A2440);background:var(--panel-2,#1C1830);cursor:pointer;color:var(--text-secondary,#7E7897)}
.etfb-s.on{border-color:#e8b34a;color:#f0d49a;background:rgba(232,179,74,.12)}
#etfb-text{width:100%;min-height:64px;background:var(--panel-2,#1C1830);color:var(--text,#C9C4DA);border:1px solid var(--edge,#2A2440);border-radius:8px;padding:9px 10px;font:13.5px/1.5 inherit;resize:vertical}
.etfb-name{width:100%;background:var(--panel-2,#1C1830);color:var(--text,#C9C4DA);border:1px solid var(--edge,#2A2440);border-radius:8px;padding:8px 10px;font:13.5px inherit;margin-top:10px}
.etfb-ctx{margin-top:11px;font-size:11px;color:var(--text-secondary,#7E7897);border-top:1px dashed var(--edge,#2A2440);padding-top:9px}
.etfb-thumbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.etfb-thumb{position:relative;width:52px;height:52px;border-radius:6px;overflow:hidden;border:1px solid var(--edge,#2A2440)}
.etfb-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.etfb-thumb button{position:absolute;top:1px;right:1px;width:16px;height:16px;line-height:14px;border:0;border-radius:50%;background:rgba(0,0,0,.72);color:#fff;font-size:11px;cursor:pointer;padding:0}
.etfb-send{width:100%;margin-top:12px;border:0;border-radius:8px;background:var(--pink,#FF2E88);color:#0B0912;font-weight:800;padding:11px;font-size:14px;cursor:pointer}
.etfb-send:disabled{opacity:.6;cursor:default}
.etfb-shorts{font-size:11px;color:var(--text-secondary,#7E7897);text-align:center;margin:8px 0 0}
.etfb-shorts b{color:var(--blue,#35D6EA)}
#etfb-toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(8px);z-index:2147483002;
  background:#10331f;border:1px solid #57e389;color:#bff5e0;padding:10px 18px;border-radius:8px;font:600 13px/1 "Inter","Segoe UI",sans-serif;
  opacity:0;pointer-events:none;transition:.2s}
#etfb-toast.show{opacity:1;transform:translateX(-50%)}
</style>
<div id="etfb-root">
  <button id="etfb-fab" onclick="etfbOpen()">💬 Feedback</button>
  <div id="etfb-panel">
    <div class="etfb-h"><b>Send feedback</b><button class="etfb-x" onclick="etfbClose()">×</button></div>
    <div class="etfb-body">
      <div class="etfb-sents">
        <button class="etfb-sent" data-v="love">💚 Love this</button>
        <button class="etfb-sent on" data-v="issue">🛠 Needs work</button>
        <button class="etfb-sent" data-v="idea">💡 Idea</button>
      </div>
      <label class="etfb-l">Which part?</label>
      <div class="etfb-pills" id="etfb-pills">
        <span class="etfb-pill on">Layout &amp; sizing</span><span class="etfb-pill">Colors &amp; contrast</span>
        <span class="etfb-pill">Content</span><span class="etfb-pill">Navigation</span><span class="etfb-pill">Other</span>
      </div>
      <div id="etfb-sevrow">
        <label class="etfb-l">How much does it bug you?</label>
        <div class="etfb-sev" id="etfb-sev"><div class="etfb-s">Minor</div><div class="etfb-s on">Annoying</div><div class="etfb-s">Blocking</div></div>
      </div>
      <label class="etfb-l">Tell me more</label>
      <textarea id="etfb-text" placeholder="What's not working? e.g. the hero panel overlaps on mobile"></textarea>
      <input id="etfb-name" class="etfb-name" placeholder="Your name or initials (optional)">
      <div class="etfb-thumbs" id="etfb-thumbs"></div>
      <div class="etfb-ctx" id="etfb-ctx"></div>
      <button class="etfb-send" id="etfb-send" onclick="etfbSend()">Send feedback</button>
      <p class="etfb-shorts">Paste a screenshot with <b>Ctrl+V</b> · send with <b>Ctrl+Enter</b></p>
    </div>
  </div>
  <div id="etfb-toast"></div>
</div>
<script>
(function(){
  var sentiment='issue', category='Layout & sizing', severity='Annoying', shots=[];
  var ph={love:"What's working well? What do you like?",
          issue:"What's not working? e.g. the hero panel overlaps on mobile",
          idea:"What would you add or change?"};
  function el(id){return document.getElementById(id);}
  function ctx(){var d=window.devicePixelRatio||1;return{
    screen:screen.width+'x'+screen.height, viewport:innerWidth+'x'+innerHeight,
    dpr:Math.round(d*100)/100, ua:navigator.userAgent, lang:navigator.language, url:location.href,
    theme:document.documentElement.getAttribute('data-theme')};}
  window.etfbOpen=function(){el('etfb-panel').classList.add('open');el('etfb-fab').style.display='none';
    var c=ctx();
    el('etfb-ctx').innerHTML='Sent automatically: <b>screen</b> '+c.screen+' · <b>window</b> '+c.viewport+' · <b>scale</b> '+c.dpr+'× · <b>page</b> '+location.pathname;};
  window.etfbClose=function(){el('etfb-panel').classList.remove('open');el('etfb-fab').style.display='flex';};
  [].forEach.call(document.querySelectorAll('.etfb-sent'),function(b){b.addEventListener('click',function(){
    [].forEach.call(document.querySelectorAll('.etfb-sent'),function(x){x.classList.remove('on');});b.classList.add('on');
    sentiment=b.getAttribute('data-v'); el('etfb-text').placeholder=ph[sentiment];
    el('etfb-sevrow').style.display=(sentiment==='issue')?'block':'none';});});
  el('etfb-pills').addEventListener('click',function(e){if(e.target.classList.contains('etfb-pill')){
    [].forEach.call(this.children,function(p){p.classList.remove('on');});e.target.classList.add('on');category=e.target.textContent.trim();}});
  el('etfb-sev').addEventListener('click',function(e){if(e.target.classList.contains('etfb-s')){
    [].forEach.call(this.children,function(p){p.classList.remove('on');});e.target.classList.add('on');severity=e.target.textContent.trim();}});
  // pasted-screenshot thumbnails
  function renderThumbs(){var c=el('etfb-thumbs');c.innerHTML='';shots.forEach(function(d,i){
    var t=document.createElement('div');t.className='etfb-thumb';
    var img=document.createElement('img');img.src=d;
    var x=document.createElement('button');x.type='button';x.title='Remove';x.textContent='×';x.setAttribute('data-i',i);
    t.appendChild(img);t.appendChild(x);c.appendChild(t);});}
  el('etfb-thumbs').addEventListener('click',function(e){var b=e.target.closest('button');
    if(b){shots.splice(+b.getAttribute('data-i'),1);renderThumbs();}});
  var panel=el('etfb-panel');
  panel.addEventListener('paste',function(e){var items=(e.clipboardData||{}).items||[];
    for(var i=0;i<items.length;i++){var it=items[i];
      if(it.type&&it.type.indexOf('image')===0){var f=it.getAsFile();if(f){
        var r=new FileReader();r.onload=function(ev){shots.push(ev.target.result);renderThumbs();};
        r.readAsDataURL(f);e.preventDefault();}}}});
  panel.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();etfbSend();}});
  function done(ok){etfbClose();el('etfb-text').value='';el('etfb-name').value='';el('etfb-text').style.borderColor='';
    if(ok){shots=[];renderThumbs();}
    var t=el('etfb-toast');t.textContent=ok?'✓ Thanks — sent!':"⚠ Couldn't send — is dev-server.py running?";
    t.style.borderColor=ok?'#57e389':'#e8b34a';t.style.color=ok?'#bff5e0':'#f0d49a';t.style.background=ok?'#10331f':'#33270f';
    t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2800);}
  window.etfbSend=function(){var text=el('etfb-text').value.trim();
    if(!text){el('etfb-text').focus();el('etfb-text').style.borderColor='#e8b34a';return;}
    var payload={sentiment:sentiment,category:category,severity:(sentiment==='issue'?severity:null),
      text:text,name:el('etfb-name').value.trim(),screenshots:shots.slice(),ctx:ctx()};
    var b=el('etfb-send');b.disabled=true;b.textContent='Sending…';
    fetch('/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      .then(function(r){if(!r.ok)throw 0;done(true);}).catch(function(){done(false);})
      .then(function(){b.disabled=false;b.textContent='Send feedback';});};
})();
</script>
