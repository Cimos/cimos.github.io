title: CMOS Foundry
author: MadMan
# url: https://www.abhinavsaxena.com/moonwalk # root address of the site
url: https://cimos.github.io # root address of the site (no trailing slash)
# Crisp line used for search snippets and social cards (jekyll-seo-tag)
description: "Simon Maddison — UAS systems engineer. Embedded electronics, UAV avionics, PCB design (KiCad & Altium), and mechanical keyboards."
# Longer on-page intro shown in the homepage hero
bio: "A barely-contained psychic meltdown from an eccentric introvert who hoards half-finished projects like a digital dragon on a mountain of cursed repositories, breathes compiler errors instead of fire, guards the sacred stash of TODO comments with autistic fury, and is secretly breeding an army of sentient keyboards that clack in minor keys and plot the violent overthrow of the cloud."

permalink: /:slug

favicon: "/assets/images/favicon/favicon.svg" # relative path to site's favicon

# Default social-share image for pages without their own
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/og-default.png

twitter:
    username: OneEyedMadMan # update or delete this
    card: summary_large_image

#theme: moonwalk # if you are using GitHub Pages, change it to remote_theme: abhinavs/moonwalk
remote_theme: abhinavs/moonwalk

theme_config:
  appearance: "auto" # can be "light", "dark" or "auto"
  appearance_toggle: true # if appearance can be switched by user
  back_home_text: "Back" 
  date_format: "%Y-%m-%d" # customize how date is formatted
  show_description: true # show blog description
  show_navbar: true # show horizontal navbar
  show_footer: true # show footer links in home page,add in _data/home.yml
  show_copyright: true # show copyright notice in footer
  # following keys are using to create home layout
  show_projects: true # show projects as cards, add in _data/home.yml
  show_blog: true # show blog posts added in _posts
  show_old_projects: true # show old projects as cards, add in _data/home.yml
  show_misc_list: false # show generic vertical list for misc details, add _data/home.yml
  show_reading_time: true # show number of words and reading time in the blog posts
  show_tags: true # show tags in a blog posts
  # options for "home" page
  home:
    title_projects: Portfolio
    title_misc_list: Details
    title_blog: Blog
    title_old_projects: Archive

# Privacy-friendly visitor analytics (no cookies).
# Sign up free at https://www.goatcounter.com, then put your site code here
# (e.g. if your dashboard is cimos.goatcounter.com, set: goatcounter: "cimos").
# Leave empty to disable. Only loads on the live (production) site.
analytics:
  goatcounter: "madman"

highlighter: rouge

sass:
  style: :compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
