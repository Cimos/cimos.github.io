    url: about

  - title: blog
    url: blog

project_entries:
  - title: KiCad Custom Design Rules
    url: kicad-custom-design-rules
    repo: Cimos/KiCad-CustomDesignRules
    desc: KiCad 8 custom design rules that match JLCPCB and PCBWay manufacturing limits.

  - title: Etchy
    highlight: SOON
    desc: A fast, trustworthy PCB diff tool built in Rust. Point it at two revisions of a board's fab output — Gerber, drill, pick-and-place — and it shows and measures every change, with a pass/fail gate for CI. CLI, desktop viewer, and a tiny container. Open source, first release landing soon.

  - title: Mad_RP2040
    url: madrp2040-anything-keypad
    repo: Cimos/Mad_RP2040
    desc: 4×4 backlit "anything keypad" built around the RP2040, with a full KiBot CI pipeline. Started as a 2-key controller test board.

  - title: kitium
    url: kitium
    repo: Cimos/kitium
    desc: CI/CD gate that converts Altium PCB projects to KiCad and validates the output.

  - title: KiCad DRU — VS Code Extension
    url: vscode-kicad-dru-extension
    repo: Cimos/vscode-kicad-dru
    desc: Syntax highlighting and snippets for KiCad's `.kicad_dru` custom design rule files.

  - title: kibot-config
    url: kibot-config
    repo: Cimos/kibot-config
    desc: Reusable KiBot configs that generate fabrication datapacks from KiCad projects.

  - title: Altium → DigiKey
    url: altium-push-to-digikey
    repo: Cimos/Altium-Push-to-DigiKey
    desc: Pushes an Altium BOM to a DigiKey cart through their public API.

  - title: iBOM for Altium
    url: ibom-for-altium
    repo: Cimos/interactivehtmlbom4altium2
    desc: Generates an interactive HTML BOM from Altium Designer projects.

  - title: Corne Split Keyboard
    url: mechanical-keyboard-rabbit-hole
    desc: My journey into the world of custom mechanical keyboards.

  - title: TODO List for the Lazy
    url: todo-list
    desc: A living list of what I'm working on, putting off, or pretending doesn't exist.
    highlight: WIP

old_project_entries:
  - title: Dynamic Room Audio Correction (DRAC)
    url: dynamic-room-audio-correction
    desc: My 2018 final-year capstone — a real-time Kirkeby room-correction system on the ADSP-SC589 SHARC, with a Qt control app.

  - title: Mic Phantom Power Supply
    url: mic-phantom-power-supply
    desc: A standalone 48 V phantom power supply for condenser microphones. From the archives — 2017 vintage.

